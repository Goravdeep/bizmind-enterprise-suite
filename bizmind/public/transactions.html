<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Transactions - BizMind Enterprise Suite</title>
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>
    <div class="sidebar">
        <div class="logo"><h2>🏢 BizMind</h2><p>Enterprise Suite</p></div>
        <div class="nav-menu">
            <a href="/" class="nav-item">📊 Dashboard</a>
            <a href="/warehouse" class="nav-item">🏭 Warehouse</a>
            <a href="/transactions" class="nav-item active">💰 Transactions</a>
        </div>
    </div>

    <div class="main-content">
        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 24px;">
            <div><h1>Financial Transactions</h1><p style="color: #6B7280;">Track income, expenses, and generate reports</p></div>
            <div><button class="btn btn-primary" onclick="showAddTransactionModal()">+ Add Transaction</button></div>
        </div>

        <!-- Filters -->
        <div class="card" style="margin-bottom: 24px;">
            <div style="display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 16px;">
                <div><label>Start Date</label><input type="date" id="startDate"></div>
                <div><label>End Date</label><input type="date" id="endDate"></div>
                <div><label>Type</label><select id="typeFilter"><option value="all">All</option><option value="income">Income</option><option value="expense">Expense</option></select></div>
                <div style="display: flex; align-items: flex-end; gap: 8px;"><button class="btn btn-primary" onclick="applyFilters()">Apply Filters</button><button class="btn btn-secondary" onclick="exportCSV()">Export CSV</button></div>
            </div>
        </div>

        <!-- Summary Cards -->
        <div class="dashboard-cards" style="margin-bottom: 24px;">
            <div class="card"><div class="card-title">Total Income</div><div class="card-value" id="summaryIncome">₹0</div></div>
            <div class="card"><div class="card-title">Total Expense</div><div class="card-value" id="summaryExpense">₹0</div></div>
            <div class="card"><div class="card-title">Net Balance</div><div class="card-value" id="summaryBalance">₹0</div></div>
        </div>

        <!-- Transactions Table -->
        <div class="table-container">
            <table style="width: 100%;">
                <thead><tr><th>Date</th><th>Type</th><th>Description</th><th>Category</th><th>Amount</th><th>Receipt Note</th><th>Actions</th></tr></thead>
                <tbody id="transactionsTable"></tbody>
            </table>
        </div>

        <!-- PDF Reports Section -->
        <div class="card" style="margin-top: 24px;">
            <h3 style="margin-bottom: 16px;">📄 Generate PDF Reports</h3>
            <div style="display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 16px;">
                <div><label>Start Date</label><input type="date" id="reportStartDate"></div>
                <div><label>End Date</label><input type="date" id="reportEndDate"></div>
                <div><label>Month/Year for Monthly Slip</label><input type="month" id="monthYear"></div>
            </div>
            <div style="display: flex; gap: 12px; flex-wrap: wrap; margin-top: 16px;">
                <button class="btn btn-primary" onclick="generateExpenseReport()">📊 Expense Report</button>
                <button class="btn btn-primary" onclick="generateProfitLoss()">💰 Profit & Loss Statement</button>
                <button class="btn btn-primary" onclick="generateMonthlySlip()">📅 Monthly Transaction Slip</button>
            </div>
        </div>
    </div>

    <!-- Transaction Modal -->
    <div id="transactionModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">Add/Edit Transaction</div>
            <form id="transactionForm">
                <input type="hidden" id="transactionId">
                <div class="form-group"><label>Type</label><select id="transType"><option value="income">Income</option><option value="expense">Expense</option></select></div>
                <div class="form-group"><label>Amount (₹)</label><input type="number" step="0.01" id="transAmount" required></div>
                <div class="form-group"><label>Description</label><input type="text" id="transDescription" required></div>
                <div class="form-group"><label>Category</label><input type="text" id="transCategory" placeholder="e.g., sales, purchase, salary"></div>
                <div class="form-group"><label>Date</label><input type="date" id="transDate" required></div>
                <div class="form-group"><label>Receipt Note</label><textarea id="transReceipt" placeholder="Any notes about receipt/invoice"></textarea></div>
                <div style="display: flex; gap: 12px; justify-content: flex-end;">
                    <button type="button" class="btn btn-secondary" onclick="closeModal('transactionModal')">Cancel</button>
                    <button type="submit" class="btn btn-primary">Save</button>
                </div>
            </form>
        </div>
    </div>

    <script src="/js/shared.js"></script>
    <script>
        let allTransactions = [];

        async function loadTransactions() {
            const startDate = document.getElementById('startDate').value;
            const endDate = document.getElementById('endDate').value;
            const type = document.getElementById('typeFilter').value;
            
            let url = '/api/transactions?';
            if (startDate) url += `startDate=${startDate}&`;
            if (endDate) url += `endDate=${endDate}&`;
            if (type !== 'all') url += `type=${type}`;
            
            const response = await fetch(url);
            const data = await response.json();
            if (data.success) {
                allTransactions = data.data;
                renderTransactions();
                updateSummary();
            }
        }

        function renderTransactions() {
            const tbody = document.getElementById('transactionsTable');
            tbody.innerHTML = allTransactions.map(t => `
                <tr>
                    <td>${formatDate(t.date)}</td>
                    <td><span style="padding: 4px 8px; border-radius: 4px; background: ${t.type === 'income' ? '#D1FAE5' : '#FEE2E2'}">${t.type}</span></td>
                    <td>${t.description}</td>
                    <td>${t.category || '-'}</td>
                    <td style="color: ${t.type === 'income' ? '#10B981' : '#EF4444'}; font-weight: bold;">${formatCurrency(t.amount)}</td>
                    <td>${t.receipt_note ? t.receipt_note.substring(0, 30) : '-'}</td>
                    <td>
                        <button class="btn btn-secondary" style="padding: 4px 8px;" onclick="editTransaction(${t.id})">Edit</button>
                        <button class="btn btn-danger" style="padding: 4px 8px;" onclick="deleteTransaction(${t.id})">Delete</button>
                    </td>
                </tr>
            `).join('');
        }

        function updateSummary() {
            const income = allTransactions.filter(t => t.type === 'income').reduce((sum, t) => sum + t.amount, 0);
            const expense = allTransactions.filter(t => t.type === 'expense').reduce((sum, t) => sum + t.amount, 0);
            document.getElementById('summaryIncome').innerHTML = formatCurrency(income);
            document.getElementById('summaryExpense').innerHTML = formatCurrency(expense);
            document.getElementById('summaryBalance').innerHTML = formatCurrency(income - expense);
        }

        function applyFilters() { loadTransactions(); }

        function showAddTransactionModal() {
            document.getElementById('transactionId').value = '';
            document.getElementById('transactionForm').reset();
            document.getElementById('transDate').value = new Date().toISOString().split('T')[0];
            document.getElementById('transactionModal').classList.add('active');
        }

        function editTransaction(id) {
            const t = allTransactions.find(t => t.id === id);
            if (t) {
                document.getElementById('transactionId').value = t.id;
                document.getElementById('transType').value = t.type;
                document.getElementById('transAmount').value = t.amount;
                document.getElementById('transDescription').value = t.description;
                document.getElementById('transCategory').value = t.category || '';
                document.getElementById('transDate').value = t.date;
                document.getElementById('transReceipt').value = t.receipt_note || '';
                document.getElementById('transactionModal').classList.add('active');
            }
        }

        async function deleteTransaction(id) {
            if (confirm('Delete this transaction?')) {
                const response = await fetch(`/api/transactions/${id}`, { method: 'DELETE' });
                if ((await response.json()).success) {
                    showNotification('Transaction deleted', 'success');
                    loadTransactions();
                }
            }
        }

        document.getElementById('transactionForm')?.addEventListener('submit', async (e) => {
            e.preventDefault();
            const id = document.getElementById('transactionId').value;
            const data = {
                type: document.getElementById('transType').value,
                amount: parseFloat(document.getElementById('transAmount').value),
                description: document.getElementById('transDescription').value,
                category: document.getElementById('transCategory').value,
                date: document.getElementById('transDate').value,
                receipt_note: document.getElementById('transReceipt').value
            };
            
            const url = id ? `/api/transactions/${id}` : '/api/transactions';
            const method = id ? 'PUT' : 'POST';
            const response = await fetch(url, { method, headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(data) });
            if ((await response.json()).success) {
                showNotification(`Transaction ${id ? 'updated' : 'added'}`, 'success');
                closeModal('transactionModal');
                loadTransactions();
            }
        });

        async function exportCSV() {
            const startDate = document.getElementById('startDate').value;
            const endDate = document.getElementById('endDate').value;
            const type = document.getElementById('typeFilter').value;
            window.location.href = `/api/transactions/export/csv?startDate=${startDate}&endDate=${endDate}&type=${type}`;
        }

        function generateExpenseReport() {
            const start = document.getElementById('reportStartDate').value;
            const end = document.getElementById('reportEndDate').value;
            if (!start || !end) { showNotification('Please select date range', 'error'); return; }
            window.open(`/api/reports/expense-report?startDate=${start}&endDate=${end}`, '_blank');
        }

        function generateProfitLoss() {
            const start = document.getElementById('reportStartDate').value;
            const end = document.getElementById('reportEndDate').value;
            if (!start || !end) { showNotification('Please select date range', 'error'); return; }
            window.open(`/api/reports/profit-loss?startDate=${start}&endDate=${end}`, '_blank');
        }

        function generateMonthlySlip() {
            const monthYear = document.getElementById('monthYear').value;
            if (!monthYear) { showNotification('Please select month and year', 'error'); return; }
            const [year, month] = monthYear.split('-');
            window.open(`/api/reports/monthly-slip?month=${month}&year=${year}`, '_blank');
        }

        function closeModal(id) { document.getElementById(id).classList.remove('active'); }

        // Initialize with last 30 days
        const today = new Date();
        const thirtyDaysAgo = new Date(today);
        thirtyDaysAgo.setDate(today.getDate() - 30);
        document.getElementById('startDate').value = thirtyDaysAgo.toISOString().split('T')[0];
        document.getElementById('endDate').value = today.toISOString().split('T')[0];
        document.getElementById('reportStartDate').value = thirtyDaysAgo.toISOString().split('T')[0];
        document.getElementById('reportEndDate').value = today.toISOString().split('T')[0];
        document.getElementById('monthYear').value = `${today.getFullYear()}-${String(today.getMonth() + 1).padStart(2, '0')}`;
        
        loadTransactions();
    </script>
</body>
</html>
